<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWAY WAYS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stage">
    <svg id="board" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1456 819">
      <image id="winImg" x="0" y="0" width="1456" height="819" preserveAspectRatio="xMidYMid meet" style="display:none"/>
      <g id="boardG">
        <g id="gArrowsLive"></g>
        <g id="gProv"></g>
        <g id="gLetters"></g>
        <g id="gMarkers"></g>
      </g>

      <g id="hintScreen" style="display:none">
        <rect x="0" y="0" width="1456" height="819" fill="#fff"/>
        <g id="hintScale"><image id="hintImg" x="0" y="0" width="1456" height="819" preserveAspectRatio="xMidYMid meet"/></g>
      </g>
      <rect id="hintBar" x="0" y="0" width="0" height="8" fill="#222" style="display:none"/>

      <g id="gHud">
        <g id="hudExit"></g>
        <g id="hudHint"></g>
        <g id="hudQuit" style="display:none"></g>
        <line id="lineL" x1="210" y1="776" x2="628" y2="776" stroke="#222" stroke-width="2"/>
        <line id="lineR" x1="828" y1="776" x2="1246" y2="776" stroke="#222" stroke-width="2"/>
        <g id="hudGreen"></g>
        <g id="hudTimer"></g>
        <g id="hudStart"></g>
        <g id="hudRed"></g>
      </g>

      <g id="gExtras"></g>

      <g id="overGameover" style="display:none">
        <rect x="0" y="0" width="1456" height="819" fill="#fff" fill-opacity="0.85"/>
        <g id="goText"></g>
        <g id="goRetry"></g>
        <g id="goExit"></g>
      </g>

      <g id="measure" style="visibility:hidden"></g>
    </svg>
  </div>
  <script src="layout.js"></script>
  <script>/* レイアウトエディタのプレビュー：?pv= で渡された LAYOUT を反映 */try{var _pv=new URLSearchParams(location.search).get('pv');if(_pv)window.LAYOUT=JSON.parse(decodeURIComponent(_pv));}catch(e){}</script>
  <script src="config.js"></script>
  <script src="quizzes.js"></script>
  <script src="glyphs.js"></script>
  <script src="texts.js"></script>
  <script src="main.js"></script>
</body>
</html>
